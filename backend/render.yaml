services:
  - type: web
    name: hardware-pos-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: hardware-pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app

databases:
  - name: hardware-pos-db
    databaseName: hardware
    user: hardware_user
    plan: free
