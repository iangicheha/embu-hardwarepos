version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hardware
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hardware
      JWT_SECRET: dev-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      BCRYPT_SALT_ROUNDS: 10
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build: .
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
